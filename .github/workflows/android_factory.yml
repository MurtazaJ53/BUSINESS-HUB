name: Android Build Factory

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Install Dependencies
        run: npm install --legacy-peer-deps

      - name: Build Web Project
        run: npm run build

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Verify Build Secrets
        run: |
          MISSING=0
          if [ -z "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" ]; then echo "❌ ANDROID_KEYSTORE_BASE64 is missing"; MISSING=1; fi
          if [ -z "${{ secrets.ANDROID_KEYSTORE_PASSWORD }}" ]; then echo "❌ ANDROID_KEYSTORE_PASSWORD is missing"; MISSING=1; fi
          if [ -z "${{ secrets.ANDROID_KEY_ALIAS }}" ]; then echo "❌ ANDROID_KEY_ALIAS is missing"; MISSING=1; fi
          if [ -z "${{ secrets.ANDROID_KEY_PASSWORD }}" ]; then echo "❌ ANDROID_KEY_PASSWORD is missing"; MISSING=1; fi
          if [ $MISSING -eq 1 ]; then exit 1; fi
          echo "✅ All build secrets are presence."

      - name: Decode Keystore
        if: github.ref == 'refs/heads/main'
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | tr -d '\r\n ' | base64 --decode > android/app/business-hub.jks
          if [ ! -s android/app/business-hub.jks ]; then echo "❌ Keystore decoding failed"; exit 1; fi

      - name: Keystore Doctor (Validation)
        if: github.ref == 'refs/heads/main'
        run: |
          echo "🩺 Starting Keystore Diagnostics..."
          # 1. Check Store Password
          if ! keytool -list -keystore android/app/business-hub.jks -storepass "${{ secrets.ANDROID_KEYSTORE_PASSWORD }}" > /dev/null 2>&1; then
            echo "❌ ERROR: 'ANDROID_KEYSTORE_PASSWORD' is incorrect for this keystore file."
            exit 1
          fi
          # 2. Check Alias
          if ! keytool -list -keystore android/app/business-hub.jks -storepass "${{ secrets.ANDROID_KEYSTORE_PASSWORD }}" -alias "${{ secrets.ANDROID_KEY_ALIAS }}" > /dev/null 2>&1; then
            echo "❌ ERROR: Key Alias '${{ secrets.ANDROID_KEY_ALIAS }}' not found in this keystore."
            exit 1
          fi
          echo "✅ Keystore diagnostics passed! Passwords and Alias are valid."

      - name: Build Android APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        if: github.ref == 'refs/heads/main'
        with:
          tag_name: latest
          name: Latest Automated Build
          body: "This is an automated build of the latest code. Download the Signed APK below."
          files: android/app/build/outputs/apk/release/app-release.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: BusinessHub-Signed-APK
          path: android/app/build/outputs/apk/release/app-release.apk
