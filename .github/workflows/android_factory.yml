name: Continuous Build Factory

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-web-android:
    name: Build Web + Android
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: "21"

      - name: Install Dependencies
        run: npm install --legacy-peer-deps

      - name: Build Web Project
        run: npm run build

      - name: Upload Web Artifact
        uses: actions/upload-artifact@v4
        with:
          name: BusinessHub-Web
          path: dist
          if-no-files-found: error

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Verify Android Build Secrets
        run: |
          missing=0
          if [ -z "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" ]; then echo "ANDROID_KEYSTORE_BASE64 is missing"; missing=1; fi
          if [ -z "${{ secrets.ANDROID_KEYSTORE_PASSWORD }}" ]; then echo "ANDROID_KEYSTORE_PASSWORD is missing"; missing=1; fi
          if [ -z "${{ secrets.ANDROID_KEY_ALIAS }}" ]; then echo "ANDROID_KEY_ALIAS is missing"; missing=1; fi
          if [ -z "${{ secrets.ANDROID_KEY_PASSWORD }}" ]; then echo "ANDROID_KEY_PASSWORD is missing"; missing=1; fi
          if [ "$missing" -eq 1 ]; then exit 1; fi

      - name: Decode Keystore
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | tr -d '\r\n ' | base64 --decode > android/app/business-hub.jks
          if [ ! -s android/app/business-hub.jks ]; then
            echo "Keystore decoding failed"
            exit 1
          fi

      - name: Keystore Doctor
        run: |
          if ! keytool -list -keystore android/app/business-hub.jks -storepass "${{ secrets.ANDROID_KEYSTORE_PASSWORD }}" > /dev/null 2>&1; then
            echo "ANDROID_KEYSTORE_PASSWORD is incorrect for android/app/business-hub.jks"
            exit 1
          fi
          if ! keytool -list -keystore android/app/business-hub.jks -storepass "${{ secrets.ANDROID_KEYSTORE_PASSWORD }}" -alias "${{ secrets.ANDROID_KEY_ALIAS }}" > /dev/null 2>&1; then
            echo "ANDROID_KEY_ALIAS was not found in android/app/business-hub.jks"
            exit 1
          fi

      - name: Build Android APK
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}

      - name: Upload Android APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: BusinessHub-Android-APK
          path: android/app/build/outputs/apk/release/app-release.apk
          if-no-files-found: error

  build-desktop:
    name: Build Desktop (${{ matrix.label }})
    runs-on: ${{ matrix.platform }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: Windows
            platform: windows-latest
            bundle_args: --bundles msi,nsis
            artifact_name: BusinessHub-Desktop-Windows
          - label: Linux
            platform: ubuntu-22.04
            bundle_args: --bundles deb,appimage
            artifact_name: BusinessHub-Desktop-Linux
          - label: macOS
            platform: macos-latest
            bundle_args: --bundles dmg,app
            artifact_name: BusinessHub-Desktop-macOS

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux System Dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install Root Dependencies
        run: npm install --legacy-peer-deps

      - name: Install Desktop Dependencies
        working-directory: apps/desktop
        run: npm install

      - name: Build Frontend
        run: npm run build

      - name: Build Desktop Bundles
        working-directory: apps/desktop
        run: npm run tauri -- build ${{ matrix.bundle_args }}

      - name: Upload Desktop Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: apps/desktop/src-tauri/target/release/bundle
          if-no-files-found: error

  publish-latest-release:
    name: Publish Latest Release
    runs-on: ubuntu-latest
    needs:
      - build-web-android
      - build-desktop
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Download All Artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: List Release Files
        run: find release-artifacts -type f | sort

      - name: Publish Latest GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest Automated Build
          body: |
            Automated build from the main branch.

            Included artifacts:
            - Web production build
            - Signed Android APK
            - Windows desktop bundles
            - Linux desktop bundles
            - macOS desktop bundles
          files: release-artifacts/**/*
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
