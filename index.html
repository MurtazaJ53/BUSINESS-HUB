<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#0ea5e9" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="manifest" href="./manifest.json" />
    <link rel="apple-touch-icon" href="./logo.png" />
    <title>Business Hub | Pro Edition</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.8.0/sql-wasm.js"></script>
    <script>
      (function() {
        const theme = localStorage.getItem('hub_theme') || 'dark';
        const body = document.body;
        if (theme === 'dark') {
          document.documentElement.classList.add('dark');
          document.documentElement.style.backgroundColor = '#000000';
          if (body) body.style.backgroundColor = '#000000';
        } else {
          document.documentElement.classList.remove('dark');
          document.documentElement.style.backgroundColor = '#fafafa';
          if (body) body.style.backgroundColor = '#fafafa';
        }
      })();
    </script>
    <style>
      :root { background-color: #fafafa; }
      :root.dark { background-color: #000000; }
      body { margin: 0; padding: 0; min-height: 100vh; transition: background-color 0.3s ease; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="./src/main.tsx"></script>
  </body>
</html>
